name: Build and Push to ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Tag to apply to image
        type: string
        default: latest

permissions: read-all

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: wiz-panel-images

jobs:
  # Detect which files changed to determine what to run
  changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - '**'
              - '!k8s/**'
            k8s:
              - 'k8s/**'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.build-publish.outputs.image_tag }}
      full_image: ${{ steps.build-publish.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Wiz-Labs-297-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-publish
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
        run: |
          docker build . -f Dockerfile -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "full_image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name Wiz-Labs-297-eks --region ${{ env.AWS_REGION }}

      - name: Set image tag in kustomization
        working-directory: k8s
        run: kustomize edit set image wiz-panel-images=${{ steps.build-publish.outputs.full_image }}

      - name: Deploy to EKS
        run: kubectl apply -k k8s/

  deploy-k8s-manifests:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Wiz-Labs-297-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name Wiz-Labs-297-eks --region ${{ env.AWS_REGION }}

      - name: Apply K8s manifests
        run: kubectl apply -k k8s/

      - name: Restart deployment
        run: kubectl rollout restart deployment/wiz-app
