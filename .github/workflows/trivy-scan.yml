name: Trivy Container Scan

on:
  pull_request:
    branches:
      - main

permissions: read-all

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build . -f Dockerfile -t wiz-app:scan

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wiz-app:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-results.txt

      - name: Post scan results to PR
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('trivy-results.txt', 'utf8');
            const output = `#### Trivy Container Scan

            <details><summary>Show Results</summary>

            \`\`\`
            ${results}
            \`\`\`

            </details>

            *Scanned image: \`wiz-app:scan\` | Severity: CRITICAL, HIGH*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
